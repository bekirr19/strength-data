<!-- @dsCard group="Colors" viewport="700x150" name="Primary — Blue" subtitle="Accent scale for buttons, links, active states & focus rings" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-subtle); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; }
  .name { font-size: var(--text-xs); font-weight: 700; color: var(--text-primary); }
  .hex { font-size: var(--text-2xs); color: var(--text-secondary); font-variant-numeric: tabular-nums; text-transform: uppercase; }
  .star { font-size: var(--text-3xs); font-weight: 700; color: var(--blue-600); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--blue-50)"></div><div class="meta"><div class="name">blue-50</div><div class="hex">#EFF6FF</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-100)"></div><div class="meta"><div class="name">blue-100</div><div class="hex">#DBEAFE</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-400)"></div><div class="meta"><div class="name">blue-400</div><div class="hex">#60A5FA</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-500)"></div><div class="meta"><div class="name">blue-500 <span class="star">● accent</span></div><div class="hex">#3B82F6</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-600)"></div><div class="meta"><div class="name">blue-600</div><div class="hex">#2563EB</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-700)"></div><div class="meta"><div class="name">blue-700</div><div class="hex">#1D4ED8</div></div></div>
  </div>
</body>
</html>
