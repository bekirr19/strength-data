<!-- @dsCard group="Colors" viewport="700x150" name="Status & Records" subtitle="Gold = new PR, Cyan = tied PR, Green = positive, Red = destructive" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-subtle); }
  .chip { height: 56px; display: flex; align-items: center; justify-content: center; font-size: var(--text-xs); font-weight: 700; color: #fff; }
  .meta { padding: 8px 10px; }
  .name { font-size: var(--text-xs); font-weight: 700; color: var(--text-primary); }
  .hex { font-size: var(--text-2xs); color: var(--text-secondary); font-variant-numeric: tabular-nums; text-transform: uppercase; }
  .role { font-size: 0.5625rem; color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--gold-500)">NEW PR</div><div class="meta"><div class="name">gold-500</div><div class="hex">#F59E0B</div><div class="role">new personal record</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--cyan-500)">TIED PR</div><div class="meta"><div class="name">cyan-500</div><div class="hex">#06B6D4</div><div class="role">tied personal record</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--green-500)">+4%</div><div class="meta"><div class="name">green-500</div><div class="hex">#16A34A</div><div class="role">positive / success</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--red-500)">DELETE</div><div class="meta"><div class="name">red-500</div><div class="hex">#EF4444</div><div class="role">destructive / negative</div></div></div>
  </div>
</body>
</html>
