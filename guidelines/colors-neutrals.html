<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — Slate & Gray" subtitle="Surfaces, borders & text from white to slate-900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-subtle); }
  .chip { height: 60px; }
  .meta { padding: 7px 8px; }
  .name { font-size: var(--text-2xs); font-weight: 700; color: var(--text-primary); }
  .hex { font-size: 0.625rem; color: var(--text-secondary); font-variant-numeric: tabular-nums; text-transform: uppercase; }
  .role { font-size: 0.5625rem; color: var(--text-tertiary); margin-top: 1px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--white)"></div><div class="meta"><div class="name">white</div><div class="hex">#FFFFFF</div><div class="role">card</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-50)"></div><div class="meta"><div class="name">gray-50</div><div class="hex">#F7F8FA</div><div class="role">page bg</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-100)"></div><div class="meta"><div class="name">gray-100</div><div class="hex">#F1F3F5</div><div class="role">sunken</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-200)"></div><div class="meta"><div class="name">gray-200</div><div class="hex">#E5E7EB</div><div class="role">border</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-400)"></div><div class="meta"><div class="name">gray-400</div><div class="hex">#9CA3AF</div><div class="role">placeholder</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-500)"></div><div class="meta"><div class="name">gray-500</div><div class="hex">#6B7280</div><div class="role">secondary</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-700)"></div><div class="meta"><div class="name">gray-700</div><div class="hex">#374151</div><div class="role">strong</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-900)"></div><div class="meta"><div class="name">gray-900</div><div class="hex">#1F2937</div><div class="role">primary</div></div></div>
  </div>
</body>
</html>
