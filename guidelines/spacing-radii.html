<!-- @dsCard group="Spacing" viewport="700x170" name="Corner Radii" subtitle="Chips → buttons → list rows → cards (rounded-3xl) → pills" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 16px; align-items: flex-end; }
  .item { text-align: center; }
  .box { width: 84px; height: 64px; background: var(--accent-tint); border: 1px solid var(--blue-200); }
  .name { font-size: 0.625rem; font-weight: 700; color: var(--text-primary); margin-top: 8px; }
  .val { font-size: 0.5625rem; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="name">sm</div><div class="val">8px · chips</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="name">md</div><div class="val">12px · buttons</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="name">lg</div><div class="val">16px · rows</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="name">2xl</div><div class="val">24px · cards</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-full);width:84px"></div><div class="name">full</div><div class="val">pills · nav · FAB</div></div>
  </div>
</body>
</html>
