<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation — Soft Shadows" subtitle="Low-contrast shadows, no glassmorphism — plus the accent glow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 26px 22px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: flex; gap: 20px; }
  .item { text-align: center; }
  .box { width: 92px; height: 64px; background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); }
  .glow { background: var(--accent); border: none; }
  .name { font-size: 0.625rem; font-weight: 700; color: var(--text-primary); margin-top: 12px; }
  .val { font-size: 0.5625rem; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="name">xs</div><div class="val">inputs</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="name">sm</div><div class="val">cards</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="name">md</div><div class="val">hover lift</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="name">lg</div><div class="val">bottom nav</div></div>
    <div class="item"><div class="box glow" style="box-shadow:var(--shadow-accent)"></div><div class="name">accent</div><div class="val">FAB / CTA</div></div>
  </div>
</body>
</html>
