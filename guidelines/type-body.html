<!-- @dsCard group="Type" viewport="700x230" name="Body, Labels & Eyebrows" subtitle="Medium body, secondary meta, uppercase micro-labels" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); font-family: var(--font-sans); color: var(--text-primary); }
  .spec { display: flex; align-items: baseline; gap: 16px; padding: 9px 0; border-bottom: 1px solid var(--border-subtle); }
  .spec:last-child { border-bottom: 0; }
  .tag { width: 132px; flex-shrink: 0; font-size: 0.625rem; color: var(--text-tertiary); font-weight: 600; text-transform: uppercase; letter-spacing: .08em; }
</style>
</head>
<body>
  <div class="spec"><div class="tag">sm · 500 · body</div><div style="font-size:var(--text-sm);font-weight:500;color:var(--text-primary)">Log every set, rep, and kilo — then watch your numbers climb.</div></div>
  <div class="spec"><div class="tag">sm · 500 · secondary</div><div style="font-size:var(--text-sm);font-weight:500;color:var(--text-secondary)">3 records · Last 12 Nov · Chest, Shoulders</div></div>
  <div class="spec"><div class="tag">xs · 600 · meta</div><div style="font-size:var(--text-xs);font-weight:600;color:var(--text-secondary)">Average of your last 3 sessions</div></div>
  <div class="spec"><div class="tag">3xs · 700 · eyebrow</div><div class="sd-eyebrow">Strength Change (1RM)</div></div>
  <div class="spec"><div class="tag">sm · 600 · link</div><div style="font-size:var(--text-sm);font-weight:600;color:var(--text-link)">View exercise detail</div></div>
</body>
</html>
