<!-- @dsCard group="Components" viewport="700x250" name="Navigation" subtitle="Floating bottom nav · week-strip day cells" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); }
  .label { font-size: var(--text-3xs); font-weight: 700; text-transform: uppercase; letter-spacing: .12em; color: var(--text-tertiary); margin-bottom: 10px; }
  .strip { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 22px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
  const { BottomNav, WeekStrip } = window.StrengthDataDesignSystem_5c629b;
  const I = (name, size = 20) => {
    const n = lucide[name];
    let svg = '';
    if (n && Array.isArray(n)) {
      const a = { ...n[1], width: size, height: size, 'stroke-width': 2 };
      const at = Object.entries(a).map(([k, v]) => k + '="' + v + '"').join(' ');
      const kids = (n[2] || []).map(c => '<' + c[0] + ' ' + Object.entries(c[1]).map(([k, v]) => k + '="' + v + '"').join(' ') + '/>').join('');
      svg = '<svg ' + at + '>' + kids + '</svg>';
    }
    return <span dangerouslySetInnerHTML={{ __html: svg }} style={{ display: 'inline-flex' }} />;
  };
  function Demo() {
    const [tab, setTab] = React.useState('today');
    const [sel, setSel] = React.useState('2026-06-14');
    const days = [
      { iso: '2026-06-11', wd: 'Mon', d: 11, category: 'push' },
      { iso: '2026-06-12', wd: 'Tue', d: 12, category: null },
      { iso: '2026-06-13', wd: 'Wed', d: 13, category: 'pull' },
      { iso: '2026-06-14', wd: 'Thu', d: 14, category: 'leg' },
      { iso: '2026-06-15', wd: 'Fri', d: 15, category: null },
      { iso: '2026-06-16', wd: 'Sat', d: 16, category: 'other', today: true },
      { iso: '2026-06-17', wd: 'Sun', d: 17, category: null },
    ];
    return (
      <div>
        <div className="label">Week strip</div>
        <div style={{ marginBottom: 22 }}>
          <WeekStrip days={days} selectedISO={sel} onSelect={setSel} />
        </div>
        <div className="label">Bottom navigation</div>
        <BottomNav
          activeKey={tab}
          onSelect={setTab}
          items={[
            { key: 'today', label: 'Today', icon: I('CalendarDays', 22) },
            { key: 'exercises', label: 'Exercises', icon: I('Dumbbell', 22) },
          ]}
          primary={{ label: 'Add', icon: I('Plus', 26) }}
        />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
